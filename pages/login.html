<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="/src/output.css" />
    <!-- font awsome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap");
      body {
        font-family: "Poppins", sans-serif;
        scroll-behavior: smooth;
      }
    </style>
  </head>
  <body class="min-h-screen bg-white font-poppins">
    <!-- Navbar -->
    <nav class="border-gray-100 bg-white sticky top-0 z-99">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center h-16 gap-6">
          <!-- Logo -->
          <a
            href="/index.html"
            class="flex-shrink-0 text-xl font-semibold tracking-tight text-gray-900"
          >
            LAX<span class="text-green-600">IA.</span>
          </a>

          <div class="hidden md:flex justify-center gap-5 flex-1">
            <a
              href="/index.html"
              class="text-sm font-medium text-gray-500 hover:text-gray-900 px-3 py-1.5"
              >Home</a
            >
            <a
              href="./products.html"
              class="text-sm font-medium text-gray-500 hover:text-gray-900 px-3 py-1.5"
              >Products</a
            >
            <a
              href="./blog.html"
              class="text-sm font-medium text-gray-500 hover:text-gray-900 px-3 py-1.5"
              >Blog</a
            >
            <a
              href="./about.html"
              class="text-sm font-medium text-gray-500 hover:text-gray-900 px-3 py-1.5"
              >About</a
            >
          </div>

          <!-- Right Side -->
          <div class="flex items-center gap-2 ml-auto">
            <!-- Language Switcher -->
            <button
              class="flex items-center gap-1.5 h-9 px-3 hover:cursor-pointer text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors"
            >
              <i class="fa-solid fa-language"></i>
            </button>

            <!-- Dark Mode Toggle -->
            <button
              class="flex items-center gap-1.5 h-9 px-3 text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors"
            >
              <i class="fa-solid fa-moon"></i>
            </button>

            <!-- Divider -->
            <div class="hidden md:block w-px h-5 bg-gray-200"></div>

            <!-- Login / Register -->
            <div class="hidden md:flex items-center gap-2">
              <a
                href="./login.html"
                class="h-9 px-4 inline-flex items-center rounded-[20px] border border-gray-200 text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors"
              >
                Log in
              </a>
              <a
                href="./register.html"
                class="h-9 px-4 inline-flex items-center rounded-[20px] bg-green-700 hover:bg-green-900 text-white text-sm font-medium transition-colors"
              >
                Register
              </a>
            </div>
            <!-- MOBILE MENU BUTTON -->
            <label for="menu-toggle" class="md:hidden text-xl cursor-pointer">
              <i class="fa-solid fa-bars"></i>
            </label>
          </div>
        </div>
      </div>

      <!-- TOGGLE -->
      <input type="checkbox" id="menu-toggle" class="hidden peer" />

      <!-- MOBILE MENU -->
      <div class="md:hidden hidden peer-checked:block border-t bg-white">
        <div class="px-6 py-5 space-y-4 text-sm">
          <a href="/index.html" class="block">Home</a>
          <a href="./products.html" class="block">Products</a>
          <a href="./blog.html" class="block">Blog</a>
          <a href="./about.html" class="block">About</a>

          <div class="pt-4 border-t flex flex-col gap-3">
            <a
              href="./login.html"
              class="px-4 py-2 border rounded-full text-center"
              >Log in</a
            >
            <a
              href="./register.html"
              class="px-4 py-2 bg-green-700 text-white rounded-full text-center"
              >Register</a
            >
          </div>
        </div>
      </div>
    </nav>
    <!-- login form -->
    <main
      class="min-h-[calc(100vh-64px)] flex items-center justify-center pt-10"
    >
      <div
        class="w-full max-w-5xl bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden grid md:grid-cols-2"
      >
        <!-- LEFT SIDE (branding / image) -->
        <div class="hidden md:block relative">
          <!-- Image -->
          <img
            src="https://i.pinimg.com/736x/46/f7/cf/46f7cf0fdf527fa585ca2bd870030920.jpg"
            class="absolute inset-0 w-full h-full object-cover"
            alt=""
          />
        </div>
        <div class="p-8 sm:p-10">
          <!-- Title -->
          <div class="mb-6">
            <h1 class="text-2xl font-bold text-gray-900 flex justify-center">
              Login
            </h1>
          </div>

          <!-- Form -->
          <form class="space-y-5">
            <!-- Email -->
            <div>
              <label class="text-sm font-medium text-gray-700">Email</label>
              <input
                type="email"
                placeholder="lyta234@gmail.com"
                class="w-full mt-1 px-4 py-2.5 rounded-lg border border-gray-200 bg-gray-50 focus:bg-white focus:outline-none focus:border-green-500 transition"
              />
            </div>

            <!-- Password -->
            <div>
              <label class="text-sm font-medium text-gray-700">Password</label>
              <input
                type="password"
                placeholder="••••••••"
                class="w-full mt-1 px-4 py-2.5 rounded-lg border border-gray-200 bg-gray-50 focus:bg-white focus:outline-none focus:border-green-500 transition"
              />
            </div>
            <div class="flex items-center justify-between text-sm">
              <label class="flex items-center gap-2 text-gray-500">
                <input type="checkbox" class="accent-green-600" />
                Remember me
              </label>
              <a href="#" class="text-green-700 hover:underline">
                Forgot password?
              </a>
            </div>
            <button
              class="w-full mt-5 bg-green-700 hover:bg-green-800 text-white py-2.5 rounded-full font-semibold transition shadow-sm hover:shadow-md"
            >
              Login
            </button>
          </form>
          <p class="text-center text-sm text-gray-500 mt-10">
            Don’t have an account?
            <a
              href="./register.html"
              class="text-green-700 font-medium hover:underline"
            >
              Register
            </a>
          </p>
        </div>
      </div>
    </main>
  </body>
</html>
