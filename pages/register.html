<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>LAXIA</title>
    <!-- ===== SEO Meta ===== -->
    <meta
      name="description"
      content="LAXIA a trusted place where customers can confidently find authentic skincare products without worry."
    />
    <meta
      name="keywords"
      content="Skincare, Ecommerce, Product lidt, Cosmetic, LAXIA, Delivery, Online Shopping"
    />
    <meta name="author" content="LAXIA" />
    
    <link rel="stylesheet" href="/src/output.css" />
    <!-- font awsome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- aos animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap");
      body {
        font-family: "Poppins", sans-serif;
        scroll-behavior: smooth;
      }
      body.dark {
        background-color: #0f172a;
        color: #e2e8f0;
      }

      /* Navbar */
      body.dark nav {
        background-color: #020617;
        border-color: #1e293b;
      }

      body.dark nav a,
      body.dark nav button {
        color: #e2e8f0;
      }

      body.dark nav a:hover {
        color: #22c55e;
      }

      /* Sections */
      body.dark .bg-\[\#f9fafb\],
      body.dark .bg-\[\#F5F5F5\],
      body.dark .bg-\[\#f2e9dd\] {
        background-color: #020617;
      }

      /* Cards */
      body.dark .bg-white {
        background-color: #020617;
        border-color: #1e293b;
      }

      body.dark .bg-\[\#f5f5f5\] {
        background-color: #020617;
      }

      body.dark .text-gray-900 {
        color: #ffffff;
      }

      body.dark .text-gray-800 {
        color: #f1f5f9;
      }

      body.dark .text-gray-700 {
        color: #cbd5f5;
      }

      body.dark .text-gray-600,
      body.dark .text-gray-500 {
        color: #94a3b8;
      }

      body.dark .text-gray-400 {
        color: #64748b;
      }

      /* Borders */
      body.dark .border,
      body.dark .border-gray-100,
      body.dark .border-gray-200,
      body.dark .border-t {
        border-color: #1e293b;
      }

      /* Buttons */
      body.dark .bg-gray-900 {
        background-color: #1e293b;
      }

      body.dark .bg-gray-900:hover {
        background-color: #334155;
      }

      body.dark .bg-gray-100:hover {
        background-color: #1e293b;
      }

      body.dark input {
        background-color: #020617;
        border-color: #334155;
        color: #e2e8f0;
      }

      body.dark input::placeholder {
        color: #64748b;
      }

      /* Footer */
      body.dark footer {
        background-color: #020617;
      }

      body.dark .hover\:bg-gray-50:hover {
        background-color: #1e293b;
      }

      body.dark .hover\:bg-gray-100:hover {
        background-color: #1e293b;
      }

      body.dark .shadow-md,
      body.dark .hover\:shadow-md:hover {
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      }
    </style>
  </head>
  <body class="min-h-screen bg-white font-poppins">
    <!-- Navbar -->
    <nav class="border-gray-100 bg-white sticky top-0 z-99">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center h-16 gap-6">
          <!-- Logo -->
          <a
            href="/index.html"
            class="flex-shrink-0 text-xl font-semibold tracking-tight text-gray-900"
          >
            LAX<span class="text-green-600">IA.</span>
          </a>

          <div class="hidden md:flex justify-center gap-5 flex-1">
            <a
              href="/index.html"
              class="text-sm font-medium text-gray-500 hover:text-gray-900 px-3 py-1.5"
              >Home</a
            >
            <a
              href="./products.html"
              class="text-sm font-medium text-gray-500 hover:text-gray-900 px-3 py-1.5"
              >Products</a
            >
            <a
              href="./blog.html"
              class="text-sm font-medium text-gray-500 hover:text-gray-900 px-3 py-1.5"
              >Blog</a
            >
            <a
              href="./about.html"
              class="text-sm font-medium text-gray-500 hover:text-gray-900 px-3 py-1.5"
              >About</a
            >
          </div>

          <!-- Right Side -->
          <div class="flex items-center gap-2 ml-auto">
            <!-- Language Switcher -->
            <button
              class="flex items-center gap-1.5 h-9 px-3 hover:cursor-pointer text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors"
            >
              <i class="fa-solid fa-language"></i>
            </button>

            <!-- Dark Mode Toggle -->
            <button
              onclick="toggleDark()"
              class="flex items-center gap-1.5 h-9 px-3 text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors"
            >
              <i id="darkIcon" class="fa-solid fa-moon"></i>
            </button>

            <!-- Divider -->
            <div class="hidden md:block w-px h-5 bg-gray-200"></div>

            <!-- Login / Register -->
            <div class="hidden md:flex items-center gap-2">
              <a
                href="./login.html"
                class="h-9 px-4 inline-flex items-center rounded-[20px] border border-gray-200 text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors"
              >
                Log in
              </a>
              <a
                href="./register.html"
                class="h-9 px-4 inline-flex items-center rounded-[20px] bg-green-700 hover:bg-green-900 text-white text-sm font-medium transition-colors"
              >
                Register
              </a>
            </div>
            <!-- MOBILE MENU BUTTON -->
            <label for="menu-toggle" class="md:hidden text-xl cursor-pointer">
              <i class="fa-solid fa-bars"></i>
            </label>
          </div>
        </div>
      </div>

      <!-- TOGGLE -->
      <input type="checkbox" id="menu-toggle" class="hidden peer" />

      <!-- MOBILE MENU -->
      <div class="md:hidden hidden peer-checked:block border-t bg-white">
        <div class="px-6 py-5 space-y-4 text-sm">
          <a href="/index.html" class="block">Home</a>
          <a href="./products.html" class="block">Products</a>
          <a href="./blog.html" class="block">Blog</a>
          <a href="./about.html" class="block">About</a>

          <div class="pt-4 border-t flex flex-col gap-3">
            <a
              href="./login.html"
              class="px-4 py-2 border rounded-full text-center"
              >Log in</a
            >
            <a
              href="./register.html"
              class="px-4 py-2 bg-green-700 text-white rounded-full text-center"
              >Register</a
            >
          </div>
        </div>
      </div>
    </nav>
    <main class="bg-white flex items-center justify-center">
      <div
        class="w-full max-w-md bg-white p-8 rounded-2xl shadow-sm border border-gray-100"
        data-aos="fade-up"
      >
        <!-- Logo -->
        <div class="text-center mb-6">
          <h1 class="text-2xl font-bold text-gray-900">Register</h1>
          <p class="text-sm text-gray-400 mt-1">Create a new account</p>
        </div>

        <!-- Form -->
        <form class="space-y-4">
          <!-- Name -->
          <div>
            <label class="text-sm font-medium text-gray-700">User Name</label>
            <input
              type="text"
              placeholder="Your name"
              class="w-full mt-1 px-4 py-2 rounded-lg border border-gray-200 focus:outline-none focus:border-green-500"
            />
          </div>

          <!-- Email -->
          <div>
            <label class="text-sm font-medium text-gray-700">Email</label>
            <input
              type="email"
              placeholder="lyta234@gmail.com"
              class="w-full mt-1 px-4 py-2 rounded-lg border border-gray-200 focus:outline-none focus:border-green-500"
            />
          </div>

          <!-- Password -->
          <div>
            <label class="text-sm font-medium text-gray-700">Password</label>
            <input
              type="password"
              placeholder="••••••••"
              class="w-full mt-1 px-4 py-2 rounded-lg border border-gray-200 focus:outline-none focus:border-green-500"
            />
          </div>

          <!-- Confirm Password -->
          <div>
            <label class="text-sm font-medium text-gray-700"
              >Confirm Password</label
            >
            <input
              type="password"
              placeholder="••••••••"
              class="w-full mt-1 px-4 py-2 rounded-lg border border-gray-200 focus:outline-none focus:border-green-500"
            />
          </div>

          <!-- Terms -->
          <label class="flex items-start gap-2 text-sm text-gray-500">
            <input type="checkbox" class="mt-1 accent-green-600" />
            I agree to the
            <a href="#" class="text-green-700 hover:underline"
              >Terms & Conditions</a
            >
          </label>

          <!-- Button -->
          <button
            class="w-full bg-green-700 hover:bg-green-800 text-white py-2.5 rounded-full font-semibold transition"
          >
            Register
          </button>
        </form>
        <!-- Login -->
        <p class="text-center text-sm text-gray-500 mt-6 pt-5">
          Already have an account?
          <a
            href="./login.html"
            class="text-green-700 font-medium hover:underline"
            >Login</a
          >
        </p>
      </div>
    </main>
    <!-- aos -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init();
    </script>

    <script src="../script.js"></script>
  </body>
</html>
